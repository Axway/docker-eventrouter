version: "3.5"

services:
  eventrouter:
    image: eventrouter/eventrouter:3.0.

    ports:
    - "1325:1325" # same ports as the ones configured as input in yml
                  # configuration file
    - "80:80"     # port used for metrics

    volumes:
      - eventrouter_data:/data
      - "./conf/event-router.yml:/event-router.yml"

volumes:
  eventrouter_data:
    driver: local

